scenario_id: evacuation_recommendation
version: e2_rules_v1
description: Independent GT rules for multi-zone evacuation stress (cap two zones per tick).
label_rules:
  - semantic_label: evacuation_stress_pattern
    zone_id: "*"
    expected_event_type: evacuation_signal
    min_tick: 3
    max_zones_per_tick: 2
    conditions:
      - metric: zone_density
        zone: "*"
        op: gte
        value: 0.52
