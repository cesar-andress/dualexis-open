scenario_id: exit_blockage
version: emit_profiles_v1
description: >
  Decoupled emission profile for exit_blockage. GT thresholds 0.42 density / 0.55 throughput.
emit_rules:
  - semantic_label: exit_blockage
    zone_id: exit-lobby
    expected_event_type: exit_blockage
    min_tick: 1
    miss_probability: 0.0
    conditions:
      - metric: zone_density
        zone: exit-lobby
        op: gte
        value: 0.38
  - semantic_label: exit_blockage
    zone_id: exit-lobby
    expected_event_type: exit_blockage
    min_tick: 2
    miss_probability: 0.07
    conditions:
      - metric: zone_density
        zone: exit-lobby
        op: gte
        value: 0.50
  - semantic_label: exit_throughput_reduced
    zone_id: exit-lobby
    expected_event_type: exit_blockage
    min_tick: 1
    miss_probability: 0.06
    conditions:
      - metric: exit_throughput
        zone: exit-main
        op: lt
        value: 0.50
