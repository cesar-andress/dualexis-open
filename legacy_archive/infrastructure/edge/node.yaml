# DUALEXIS Edge Node — default runtime manifest
# Used by `dualexis edge run-node --config infrastructure/edge/node.yaml`

node_id: edge-001
site_id: site-local
description: Hallway capture node — semantic events only

zones:
  - zone_id: hallway-a
    label: Main hallway A
  - zone_id: hallway-b
    label: Main hallway B

modalities:
  - video
  - audio

perception:
  max_concurrent_streams: 4
  model_profile: default-scaffold

privacy:
  edge_buffer_ttl_seconds: 30
  allow_persistent_media: false
  allow_biometric_features: false
  allow_identity_linking: false
  policy_id: strict-v1

transport:
  kind: nats
  url: nats://nats:4222
  publish_subject_template: "dualexis.events.{site_id}.{zone_id}"
  health_subject_template: "dualexis.health.{node_id}"

forbidden_egress_fields:
  - raw_video
  - raw_audio
  - image_data
  - person_id
  - face_id
  - voiceprint
