# Optional Central Research Server — anonymized metrics only; separate namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: dualexis-research
  labels:
    app.kubernetes.io/part-of: dualexis
    dualexis.dev/role: research-aggregation
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: research-server-config
  namespace: dualexis-research
data:
  DUALEXIS_ENVIRONMENT: production
  DUALEXIS_ACCEPT_RAW_MEDIA: "false"
  DUALEXIS_ACCEPT_SEMANTIC_EVENTS: "false"
  DUALEXIS_ACCEPT_METRICS_ONLY: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-server
  namespace: dualexis-research
  labels:
    app.kubernetes.io/name: research-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: research-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: research-server
    spec:
      containers:
        - name: research-server
          image: dualexis/research-server:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: research-server-config
          ports:
            - name: http
              containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: research-server
  namespace: dualexis-research
spec:
  selector:
    app.kubernetes.io/name: research-server
  ports:
    - name: http
      port: 8001
      targetPort: 8001
