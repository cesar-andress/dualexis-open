apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: dualexis
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/component: fusion-graph-reasoning
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: dualexis/orchestrator:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: orchestrator-config
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
