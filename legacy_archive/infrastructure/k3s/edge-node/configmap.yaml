apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-node-config
  namespace: dualexis
  labels:
    app.kubernetes.io/name: edge-node
data:
  DUALEXIS_SITE_ID: site-local
  DUALEXIS_NODE_ID: edge-001
  DUALEXIS_NATS_URL: nats://nats.dualexis.svc.cluster.local:4222
  DUALEXIS_EDGE_BUFFER_TTL_SECONDS: "30"
  DUALEXIS_ALLOW_PERSISTENT_MEDIA: "false"
  DUALEXIS_ALLOW_BIOMETRIC_FEATURES: "false"
