apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-node
  namespace: dualexis
  labels:
    app.kubernetes.io/name: edge-node
    app.kubernetes.io/component: perception
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: edge-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edge-node
    spec:
      containers:
        - name: edge-node
          image: dualexis/edge-node:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: edge-node-config
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
              # Uncomment when NVIDIA GPU Operator is installed:
              # nvidia.com/gpu: "1"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
