apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: dualexis
  labels:
    app.kubernetes.io/name: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: dualexis
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      containers:
        - name: api
          image: dualexis/api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DUALEXIS_API_HOST
              value: "0.0.0.0"
            - name: DUALEXIS_API_PORT
              value: "8000"
            - name: DUALEXIS_NATS_URL
              value: nats://nats.dualexis.svc.cluster.local:4222
            - name: DUALEXIS_SITE_ID
              value: site-local
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: dualexis
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: dualexis.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
